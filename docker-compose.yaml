services:
  db:
    image: postgres:17-alpine
    container_name: db
    environment:
      POSTGRES_DB: uptime_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - core_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d db"]

  api:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=uptime_db
    depends_on:
      db:
        condition: service_healthy

  watcher:
    build:
      context: .
      dockerfile: cmd/watcher/Dockerfile
    ports:
      - "8081:8081"
    restart: always
    env_file:
      - .env
    environment:
      - API_URL=http://api:8080
      - CHECK_INTERVAL=60s
    depends_on:
      - api

volumes:
  postgres_data: